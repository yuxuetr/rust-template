name: 'Setup Rust'
description: 'Install Rust toolchain and set profile'

runs:
  using: "composite"
  steps:
    - name: Install dependencies and Rust
      shell: bash
      run: |
        SUDO=""
        if [ "`id -u`" -ne 0 ]; then
            SUDO="sudo"
        fi
        if ! command -v curl &> /dev/null; then
            $SUDO apt-get update && $SUDO apt-get install -y curl ca-certificates git build-essential
        fi
        export RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
        export CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal -c llvm-tools-preview
        $CARGO_HOME/bin/rustup default stable
        $CARGO_HOME/bin/rustup component add rustfmt clippy
        echo "RUSTUP_HOME=$RUSTUP_HOME" >> $GITHUB_ENV
        echo "CARGO_HOME=$CARGO_HOME" >> $GITHUB_ENV
        echo "$CARGO_HOME/bin" >> $GITHUB_PATH
